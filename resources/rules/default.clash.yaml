port: 59950
socks-port: 38815
redir-port: 32488
mode: rule
allow-lan: false
bind-address: 127.0.0.1
log-level: silent
ipv6: false
external-controller: 127.0.0.1:54344
secret: "YourSecurePasswordHere!"
tcp-concurrent: true
find-process-mode: off

tun:
  enable: true
  stack: gvisor
  mtu: 1500
  strict-route: false
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  fallback:
    - 1.1.1.1
    - 8.8.8.8
  fake-ip-filter:
    - "*.lan"
    - "*.local"

sniffer:
  enable: false

