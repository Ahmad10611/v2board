    "+.cloudflare-dns.com": ["https://dns.cloudflare.com/dns-query", "https://dns.google/dns-query"]

# پروکسی‌ها - نمونه پروکسی‌ها (پروکسی خود را جایگزین کنید)
proxies: []

# گروه‌های پروکسی
proxy-groups:
  - {name: "🌐 Proxy", type: select, proxies: ["🚀 خودکار", "⚖️ لودبالانس", "🔄 جایگزین", "DIRECT"]}
  - {name: "🚀 خودکار", type: url-test, proxies: [], url: "http://cp.cloudflare.com/generate_204", interval: 120, tolerance: 50, timeout: 2500, lazy: true}
  - {name: "⚖️ لودبالانس", type: load-balance, proxies: [], url: "http://cp.cloudflare.com/generate_204", interval: 120, strategy: consistent-hashing, timeout: 2500}
  - {name: "🔄 جایگزین", type: fallback, proxies: [], url: "http://cp.cloudflare.com/generate_204", interval: 120, timeout: 2500}

