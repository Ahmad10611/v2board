# تنظیمات TUN
tun:
  enable: true
  device: meta
  mtu: 1420  # افزایش MTU برای عملکرد بهتر
  stack: system  # تغییر به system برای عملکرد بهتر
  dns-hijack: 
    - any:53  # Hijack همه DNS queries
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  endpoint-independent-nat: true
  route-address: 
    - 0.0.0.0/1
    - 128.0.0.0/1
    - ::/1
    - 8000::/1
  route-exclude-address: 
    - 192.168.0.0/16
    - 172.16.0.0/12
    - 10.0.0.0/8
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 224.0.0.0/4
    - 240.0.0.0/4
    - 255.255.255.255/32
    - fc00::/7
    - fe80::/10
    - ff00::/8
  include-uid: []
  exclude-uid: []
  include-uid-range: []
  exclude-uid-range: []
  include-android-user: []
  exclude-android-user: []
  include-package: []
  exclude-package: []

# تنظیمات DNS - بازنگری کامل برای جلوگیری از نشتی
dns:
  enable: true
  ipv6: false
  prefer-h3: false
  use-hosts: true
  use-system-hosts: false  # غیرفعال تا از hosts سیستم استفاده نکند
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  
  # دامنه‌هایی که نباید fake-ip بگیرند
  fake-ip-filter:
    - "*.ir"
    - "+.ir"
    - "*.ikco.ir"
    - "*.esale.ikco.ir"
    - "*.digikala.com"
    - "*.snapp.ir"
    - "*.tapsi.ir"
    - "*.divar.ir"
    - "*.sheypoor.com"
    - "*.bmi.ir"
    - "*.shaparak.ir"
    - "*.bankmellat.ir"
    - "*.sb24.ir"
    - "*.bsi.ir"
    - "*.parsian-bank.ir"
    - "*.irancell.ir"
    - "*.mci.ir"
    - "*.rightel.ir"
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.home"
    - "*.arpa"
    - "*.test"
    - "*.invalid"
    - "*.example"
    - "*.internal"
    - "router.asus.com"
    - "*.amplifi.lan"
    - "*.router.synology.com"
  
  # DNS سرورهای پیش‌فرض (فقط برای bootstrap)
  default-nameserver:
    - 178.22.122.100  # Shecan
    - 185.51.200.2    # Shecan
  
  # DNS برای حل آدرس پروکسی سرور (فقط IP)
  proxy-server-nameserver:
    - 178.22.122.100  # Shecan
    - 185.51.200.2    # Shecan
  
  # DNS سرورهای اصلی - فقط گوگل و کلودفلر برای جلوگیری از نشتی
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
  
  # fallback DNS - برای دامنه‌های خارجی
  fallback:
    - https://dns.cloudflare.com/dns-query  # از طریق پروکسی
    - https://dns.google/dns-query          # از طریق پروکسی
    - tls://8.8.8.8:853                     # از طریق پروکسی
    - tls://1.1.1.1:853                     # از طریق پروکسی
  
  # شرایط استفاده از fallback
  fallback-filter:
    geoip: true
    geoip-code: IR
    ipcidr:
      - 0.0.0.0/8
      - 10.0.0.0/8
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 169.254.0.0/16
      - 172.16.0.0/12
      - 192.0.0.0/24
      - 192.0.2.0/24
      - 192.168.0.0/16
      - 198.18.0.0/15
      - 198.51.100.0/24
      - 203.0.113.0/24
      - 224.0.0.0/4
      - 240.0.0.0/4
      - 255.255.255.255/32
    domain:
      - "+.google.com"
      - "+.facebook.com"
      - "+.youtube.com"
      - "+.telegram.org"
      - "+.twitter.com"
      - "+.instagram.com"
      - "+.netflix.com"
  
  # سیاست DNS برای دامنه‌های خاص
  nameserver-policy:
    # دامنه‌های ایرانی - فقط از Shecan
    "+.ir": ["178.22.122.100", "185.51.200.2"]
    "+.ikco.ir": ["178.22.122.100", "185.51.200.2"]
    "+.digikala.com": ["178.22.122.100", "185.51.200.2"]
    "+.snapp.ir": ["178.22.122.100", "185.51.200.2"]
    "+.tapsi.ir": ["178.22.122.100", "185.51.200.2"]
    "+.divar.ir": ["178.22.122.100", "185.51.200.2"]
    "+.sheypoor.com": ["178.22.122.100", "185.51.200.2"]
    "+.aparat.com": ["178.22.122.100", "185.51.200.2"]
    "+.namava.ir": ["178.22.122.100", "185.51.200.2"]
    "+.filimo.com": ["178.22.122.100", "185.51.200.2"]
    "+.telewebion.com": ["178.22.122.100", "185.51.200.2"]
    "+.bmi.ir": ["178.22.122.100", "185.51.200.2"]
    "+.bankmellat.ir": ["178.22.122.100", "185.51.200.2"]
    "+.shaparak.ir": ["178.22.122.100", "185.51.200.2"]
    "+.irancell.ir": ["178.22.122.100", "185.51.200.2"]
    "+.mci.ir": ["178.22.122.100", "185.51.200.2"]
    "+.rightel.ir": ["178.22.122.100", "185.51.200.2"]
    
    # شبکه‌های محلی
    "+.lan": "system"
    "+.local": "system"
    "+.localhost": "system"
    "+.home": "system"
    "+.arpa": "system"
    
    # دامنه‌های خارجی - از DoH/DoT استفاده کنند (از طریق پروکسی)
    "+.google.com": ["https://dns.cloudflare.com/dns-query", "https://dns.google/dns-query"]
    "+.googleapis.com": ["https://dns.cloudflare.com/dns-query", "https://dns.google/dns-query"]
    "+.gstatic.com": ["https://dns.cloudflare.com/dns-query", "https://dns.google/dns-query"]
