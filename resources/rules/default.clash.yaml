# port: 7890
# socks-port: 7891
# redir-port: 7892
# tproxy-port: 7893
mode: rule
allow-lan: false
bind-address: "*"
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
secret: "YourSecurePasswordHere!"
tcp-concurrent: true
find-process-mode: off

tun:
  enable: true
  device: meta
  mtu: 1420
  stack: system
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  endpoint-independent-nat: true
  route-address:
    - 0.0.0.0/1
    - 128.0.0.0/1
    - ::/1
    - 8000::/1
  route-exclude-address:
    - 192.168.0.0/16
    - 172.16.0.0/12
    - 10.0.0.0/8
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 224.0.0.0/4
    - 240.0.0.0/4
    - 255.255.255.255/32
    - fc00::/7
    - fe80::/10
    - ff00::/8
    
dns:
  enable: true
  ipv6: false
  prefer-h3: false
  use-hosts: false
  use-system-hosts: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  
  fake-ip-filter:
    - "*.ir"
    - "+.ir"
    - "*.digikala.com"
    - "*.sheypoor.com"
    - "*.aparat.com"
    - "*.filimo.com"
    - "*.telewebion.com"
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.home"
    - "*.arpa"
    - "router.asus.com"
    - "*.amplifi.lan"
    - "*.router.synology.com"
    - "+.googlevideo.com"
    - "+.ytimg.com"
    - "+.fbcdn.net"
    - "+.facebook.com"
    - "*.instagram.com"
    - "*.cdninstagram.com"
    - "+.cdninstagram.com"
    - "+.instagram.com"
  default-nameserver:
    - 10.202.10.10
    - 8.8.8.8
    - 1.1.1.1
    
  proxy-server-nameserver:
    - 8.8.8.8
    - 1.1.1.1
    
  # Fallback DNS servers – اضافه کردن گزینه‌های بیشتر
  fallback:
    - tls://9.9.9.9:853
    - tls://208.67.222.222:853
    - 8.8.8.8
    - 1.1.1.1
    
  fallback-filter:
    geoip: true
    geoip-code: IR
    ipcidr:
      - 0.0.0.0/8
      - 10.0.0.0/8
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 169.254.0.0/16
      - 172.16.0.0/12
      - 192.0.0.0/24
      - 192.0.2.0/24
      - 192.168.0.0/16
      - 198.18.0.0/15
      - 198.51.100.0/24
      - 203.0.113.0/24
      - 224.0.0.0/4
      - 240.0.0.0/4
      - 255.255.255.255/32
    domain:
      - "+.google.com"
      - "+.facebook.com"
      - "+.youtube.com"
      - "+.telegram.org"
      - "+.twitter.com"
      - "+.instagram.com"
      - "+.netflix.com"
      - "+.googlevideo.com"
      - "+.ytimg.com"
      - "+.cdninstagram.com"
      
  nameserver-policy:
  
    "+.ir": 
      - 8.8.8.8
      
    # شبکه‌های محلی
    "+.lan": "system"
    "+.local": "system"
    "+.localhost": "system"
    "+.home": "system"
    "+.arpa": "system"

sniffer:
  enable: true
  sniff-tls-sni: true
  port-whitelist:
    - 80
    - 443
    - 8080
    - 8443
    - 853
    - 5228
    - 5229
    - 5230
    - 8888
    - 8889
    - 3478
    - 5222
    - 5223
  sniff:
    HTTP:
      ports: [80, 8080, 8880, 2052, 2082, 2086, 2095]
      override-destination: false
    TLS:
      ports: [443, 8443, 2053, 2083, 2087, 2096]
      override-destination: false
    QUIC:
      ports: [443, 8443]
      override-destination: false
  skip-domain:
    # سایت‌های ایرانی
    - "*.ir"
    - "*.digikala.com"
    - "*.mydigipay.com"
    - "*.snapp.market"
    - "*.sheypoor.com"
    - "*.aparat.com"
    - "*.filimo.com"
    - "*.telewebion.com"
    - "*.instagram.com"
    - "*.cdninstagram.com"
    # سرویس‌های Apple
    - "*.apple.com"
    - "*.icloud.com"
    - "*.icloud-content.com"
    # شبکه محلی
    - "*.local"
    - "*.localhost"
    - "*.lan"
    - "*.home"
    - "*.arpa"
    - "*.internal"
    # CDN ها
    - "*.cloudfront.net"
    - "*.akamaiedge.net"
    - "*.akamaihd.net"
    - "*.fastly.net"
  force-domain:
    - "+.facebook.com"
    - "+.instagram.com"
    - "+.whatsapp.com"
    - "+.telegram.org"
    - "+.twitter.com"
    - "+.youtube.com"
    - "+.tiktok.com"
    - "+.netflix.com"
    - "+.spotify.com"
    
  force-ip-sni:
    - "31.13.0.0/16"
    - "157.240.0.0/16"
    - "91.108.0.0/16"
    - "149.154.0.0/16"

proxies: []

proxy-groups:
  - name: "💉دکتر‌موبایل‌جایزان"
    type: select
    proxies:
      - "🚀 خودکار 🚀"
      - "🚀 اولین سرور فعال 🚀"
      - "⚖️ متعادل‌سازی بار"

  - name: "🚀 خودکار 🚀"
    type: url-test
    proxies: []
    url: "http://www.gstatic.com/generate_204"
    interval: 1200
    lazy: true
    health-check:
      enable: true
      timeout: 1
      retries: 2
      fail-time: 1

  - name: "🚀 اولین سرور فعال 🚀"
    type: fallback
    proxies: []
    url: "http://www.gstatic.com/generate_204"
    interval: 1200
    lazy: true
    health-check:
      enable: true
      timeout: 1
      retries: 2
      fail-time: 1

  - name: "⚖️ متعادل‌سازی بار"
    type: load-balance
    strategy: consistent-hashing
    proxies: []
    url: "http://www.gstatic.com/generate_204"
    interval: 6400
    lazy: true
    health-check:
      enable: true
      timeout: 1
      retries: 2
      fail-time: 1

