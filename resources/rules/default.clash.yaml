port: 7890
socks-port: 7891
mixed-port: 7890
allow-lan: false
bind-address: "127.0.0.1"
mode: rule
log-level: info  # تغییر به info برای دیدن لاگ‌ها
ipv6: false
geodata-mode: false
geodata-loader: memconservative
keep-alive-interval: 30  # کاهش برای اتصال پایدارتر
tcp-concurrent: true
enable-process: false
find-process-mode: off
global-client-fingerprint: chrome
external-controller: 127.0.0.1:9090
#secret: ""
profile:
  store-selected: true  # ذخیره انتخاب پروکسی
  store-fake-ip: true   # ذخیره کش fake-ip
  store-rdrc: false

# تنظیمات Sniffer پیشرفته
sniffer:
  enable: true
  
  # تشخیص SNI در TLS/HTTPS برای شناسایی دامنه واقعی
  sniff-tls-sni: true
  
  # پورت‌هایی که باید sniff شوند
  # شامل پورت‌های رایج وب، ایمیل، و اپلیکیشن‌ها
  port-whitelist:
    - 80    # HTTP
    - 443   # HTTPS
    - 8080  # HTTP Alternate
    - 8443  # HTTPS Alternate
    - 853   # DNS over TLS
    - 5228  # Google Play Store/Services
    - 5229  # Google Play Store/Services
    - 5230  # Google Play Store/Services
    - 8888  # Alternative HTTP
    - 8889  # Alternative HTTPS
    - 3478  # WhatsApp/Teams STUN/TURN
    - 5222  # XMPP (WhatsApp)
    - 5223  # Apple Push Notification
    
  # تشخیص پروتکل‌های مختلف
  sniff:
    HTTP:
      ports: [80, 8080, 8880, 2052, 2082, 2086, 2095]
      override-destination: false
    TLS:
      ports: [443, 8443, 2053, 2083, 2087, 2096]
      override-destination: false
    QUIC:
      ports: [443, 8443]
      override-destination: false
      
  # دامنه‌هایی که نباید sniff شوند (برای سرعت بیشتر)
  skip-domain:
    # سایت‌های ایرانی معروف - نیازی به بررسی ندارند
    - "*.ir"
    - "*.digikala.com"
    - "*.mydigipay.com"
    - "*.shaparak.ir"
